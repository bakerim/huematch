name: myapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  google_mobile_ads: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1  

flutter:
  uses-material-design: true
  assets:
    - assets/image/moving_pixel.png
    
flutter_native_splash:
  color: "#F8F9FA"  # Sadece arka plan rengi veriyoruz, resim koymuyoruz.
  android_12:
    color: "#F8F9FA"

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/image/moving_pixel.png" # Senin efsane logonun yolu
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/image/moving_pixel.png"
    background_color: "#F8F9FA" # O temiz off-white arka planımız
    theme_color: "#F8F9FA"